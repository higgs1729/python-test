<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>データ分析試験 模擬問題集</title>
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f1f5f9;
    --border:#e2e8f0; --border-strong:#cbd5e1;
    --text:#1e293b; --text-2:#475569; --muted:#64748b;
    --primary:#2563eb; --primary-d:#1d4ed8; --primary-bg:#eff6ff;
    --ok:#16a34a; --ok-bg:#f0fdf4; --ok-border:#86efac;
    --ng:#dc2626; --ng-bg:#fef2f2; --ng-border:#fca5a5;
    --warn:#b45309;
    --radius:10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0f172a; --surface:#1e293b; --surface-2:#273449;
      --border:#334155; --border-strong:#475569;
      --text:#e2e8f0; --text-2:#cbd5e1; --muted:#94a3b8;
      --primary:#3b82f6; --primary-d:#2563eb; --primary-bg:#1e335a;
      --ok:#4ade80; --ok-bg:#14311f; --ok-border:#166534;
      --ng:#f87171; --ng-bg:#3b1717; --ng-border:#7f1d1d;
      --warn:#fbbf24;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family:"Segoe UI","Meiryo",system-ui,sans-serif;
    background:var(--bg); color:var(--text); margin:0; padding:16px; line-height:1.7;
  }
  .wrap { max-width:720px; margin:0 auto; }

  /* ---- header ---- */
  .appbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .appbar .title { display:flex; align-items:center; gap:10px; }
  .appbar h1 { font-size:1.15rem; margin:0; font-weight:600; }
  .appbar .sub { color:var(--muted); font-size:.75rem; }
  .logo { font-size:1.4rem; line-height:1; }

  /* ---- surfaces ---- */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:20px; margin-bottom:14px;
  }
  .label { font-size:.82rem; color:var(--text-2); font-weight:600; }
  .mini { font-size:.78rem; color:var(--muted); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .spread { justify-content:space-between; }

  /* ---- buttons ---- */
  button {
    font-family:inherit; font-size:.9rem; cursor:pointer; border-radius:var(--radius);
    border:1px solid var(--border-strong); background:var(--surface); color:var(--text);
    padding:9px 14px; transition:.12s; display:inline-flex; align-items:center; gap:6px;
  }
  button:hover { border-color:var(--primary); }
  button:active { transform:scale(.98); }
  .btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); font-weight:600; }
  .btn-primary:hover { background:var(--primary-d); border-color:var(--primary-d); }
  .btn-ghost { border-color:transparent; background:transparent; color:var(--text-2); }
  .btn-ghost:hover { background:var(--surface-2); border-color:transparent; }
  .btn-danger { background:var(--ng); color:#fff; border-color:var(--ng); font-weight:600; }
  .btn-danger:hover { background:#b91c1c; border-color:#b91c1c; }
  .btn-sm { padding:6px 10px; font-size:.8rem; }
  .btn-block { width:100%; justify-content:center; }
  .btn-cta { height:46px; font-size:1rem; }

  /* ---- category chips ---- */
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; }
  .chip {
    display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px;
    font-size:.85rem; border:1px solid var(--border); background:var(--surface); color:var(--text-2);
  }
  .chip:hover { border-color:var(--border-strong); }
  .chip.on { background:var(--primary-bg); color:var(--primary); border-color:var(--primary); }
  .chip .cnt { font-size:.78em; opacity:.6; }

  /* ---- form controls ---- */
  select, input[type="number"] {
    font-family:inherit; font-size:.88rem; padding:7px 9px; color:var(--text);
    border:1px solid var(--border); border-radius:8px; background:var(--surface);
  }
  input[type="number"] { width:64px; }
  input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); }
  .opt { display:flex; align-items:center; gap:7px; font-size:.85rem; color:var(--text-2); cursor:pointer; }

  /* ---- collapsible sections ---- */
  details.sec { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:14px; padding:0 20px; }
  details.sec > summary { list-style:none; cursor:pointer; padding:16px 0; font-size:.82rem; font-weight:600;
    color:var(--text-2); display:flex; align-items:center; gap:8px; }
  details.sec > summary::-webkit-details-marker { display:none; }
  details.sec > summary::after { content:"›"; margin-left:auto; color:var(--muted); font-size:1.2em; transition:transform .15s; }
  details.sec[open] > summary::after { transform:rotate(90deg); }
  details.sec[open] { padding-bottom:18px; }

  .filter-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .filter-row > .lbl { min-width:96px; font-size:.85rem; color:var(--text-2); }

  /* ---- quiz ---- */
  .qmeta { display:flex; align-items:center; justify-content:space-between; font-size:.78rem; color:var(--muted); }
  .tag { font-size:.72rem; background:var(--primary-bg); color:var(--primary); padding:3px 11px; border-radius:999px; }
  .progress-bar { height:6px; background:var(--surface-2); border-radius:999px; overflow:hidden; margin:10px 0 16px; }
  .progress-bar > div { height:100%; background:var(--primary); transition:width .3s; }
  .qtext { font-size:1.05rem; margin-bottom:14px; white-space:pre-wrap; }
  #choices, #bdChoices { display:flex; flex-direction:column; gap:8px; }
  .choice {
    display:flex; align-items:center; gap:8px; width:100%; text-align:left;
    padding:13px 15px; border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface); color:var(--text); font-size:.95rem; white-space:pre-wrap;
  }
  .choice:hover:not(:disabled) { border-color:var(--primary); }
  .choice:disabled { cursor:default; }
  .choice.correct { background:var(--ok-bg); border-color:var(--ok-border); color:var(--ok); }
  .choice.wrong   { background:var(--ng-bg); border-color:var(--ng-border); color:var(--ng); }
  .choice .mk { margin-left:auto; font-size:.7rem; opacity:.85; white-space:nowrap; }

  .exp { margin-top:16px; padding:14px 16px; background:var(--surface-2); border-radius:var(--radius); font-size:.9rem; }
  .exp.hide { display:none; }
  .verdict.ok { color:var(--ok); } .verdict.ng { color:var(--ng); }
  .exp-main { margin-top:6px; color:var(--text-2); }
  .ce-details { margin-top:10px; }
  .ce-details > summary { cursor:pointer; font-size:.82rem; color:var(--primary); list-style:none; }
  .ce-details > summary::-webkit-details-marker { display:none; }
  .ce-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .choiceExp { font-size:.82rem; padding:7px 11px; border-radius:8px; line-height:1.55; }
  .choiceExp.ce-ok { background:var(--ok-bg); color:var(--ok); }
  .choiceExp.ce-ng { background:var(--ng-bg); color:var(--ng); }

  /* ---- marks ---- */
  .flag-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .flag-bar .lbl { font-size:.8rem; color:var(--muted); }
  .dot { display:inline-block; width:12px; height:12px; border-radius:50%; }
  .dot.check { background:#2563eb; } .dot.green { background:#16a34a; }
  .dot.yellow { background:#eab308; } .dot.red { background:#dc2626; }
  .flag-btn { padding:6px 11px; font-size:.8rem; border-radius:999px; }
  .flag-btn.active { border-color:var(--primary); background:var(--primary-bg); color:var(--primary); font-weight:600; }
  .flag-btn .cnt {
    min-width:16px; padding:0 4px; font-size:.72rem; font-weight:600; text-align:center;
    border-radius:999px; background:var(--surface-2); color:var(--muted);
  }
  .flag-btn.active .cnt { background:var(--primary); color:#fff; }
  .flag-undo { padding:6px 10px; font-size:.78rem; color:var(--muted); border-color:transparent; }
  .flag-seq { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:8px; font-size:.76rem; color:var(--muted); min-height:18px; }
  .flag-seq .seq-dot { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .flag-seq .seq-dot .num { font-size:.6rem; color:#fff; font-weight:700; position:absolute; }
  .flag-seq .dot { width:15px; height:15px; }

  .quiz-footer { display:flex; align-items:center; justify-content:space-between; margin-top:18px; }

  /* ---- browse list ---- */
  .qlist-item {
    display:flex; align-items:center; gap:10px; padding:11px 13px; width:100%; text-align:left;
    border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); margin-bottom:7px;
  }
  .qlist-item:hover { border-color:var(--primary); background:var(--surface-2); }
  .qlist-item .qnum { font-size:.76rem; color:var(--muted); min-width:50px; }
  .qlist-item .qsummary { flex:1; font-size:.9rem; }
  .qlist-item .qmark { flex-shrink:0; display:flex; gap:6px; align-items:center; }
  .fc { display:inline-flex; align-items:center; gap:2px; font-size:.72rem; color:var(--muted); }
  .fc .dot { width:11px; height:11px; }

  /* ---- result ---- */
  .score-wrap { text-align:center; }
  .big { font-size:2.6rem; font-weight:700; line-height:1.2; }
  .ok-txt { color:var(--ok); } .ng-txt { color:var(--ng); }
  table { width:100%; border-collapse:collapse; font-size:.85rem; margin-top:8px; }
  th, td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; }
  a { color:var(--primary); }
  .hide { display:none; }

  /* ---- modal ---- */
  .modal { position:fixed; inset:0; z-index:50; display:flex; align-items:flex-start; justify-content:center; padding:24px 16px; overflow:auto; }
  .modal.hide { display:none; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.55); }
  .modal-panel { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; max-width:640px; width:100%; max-height:calc(100vh - 48px); overflow:auto; }
</style>
</head>
<body>
<div class="wrap">

  <div class="appbar">
    <div class="title">
      <span class="logo">📊</span>
      <div>
        <h1>データ分析試験 模擬問題集</h1>
        <div class="sub">Python3エンジニア認定 対策 ／ 学習用オリジナル問題</div>
      </div>
    </div>
    <button class="btn-ghost btn-sm" onclick="exitApp()" title="サーバを終了して閉じる">⏻ 終了</button>
  </div>

  <!-- ===== ホーム ===== -->
  <div id="home">
    <div class="card">
      <div class="row spread">
        <span class="label">分野を選ぶ</span>
        <div class="row">
          <button class="btn-sm btn-ghost" onclick="selectAll(true)">すべて選択</button>
          <button class="btn-sm btn-ghost" onclick="selectAll(false)">すべて解除</button>
        </div>
      </div>
      <div class="chips" id="catGrid"></div>

      <div class="row spread" style="margin-top:14px;">
        <span class="label">難易度を選ぶ</span>
      </div>
      <div class="chips" id="levelGrid"></div>

      <div class="row spread" style="margin-top:18px;">
        <label class="opt">出題数
          <select id="numQ">
            <option value="10">10問</option>
            <option value="20">20問</option>
            <option value="40" selected>40問（本番形式）</option>
            <option value="0">全問</option>
          </select>
        </label>
        <div class="row" style="gap:16px;">
          <label class="opt"><input type="checkbox" id="shuffle" checked> シャッフル</label>
          <label class="opt"><input type="checkbox" id="wrongOnly"> 誤答のみ</label>
        </div>
      </div>

      <button class="btn-primary btn-block btn-cta" style="margin-top:18px;" onclick="startQuiz()">▶ 試験を開始</button>

      <div class="row" style="margin-top:12px;">
        <button class="btn-block" style="flex:1;" onclick="openBrowse()">📖 問題一覧を見る</button>
      </div>
    </div>

    <details class="sec">
      <summary>詳細な絞り込み</summary>
      <div class="filter-row">
        <span class="lbl">回答回数</span>
        <select id="seenOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="seenVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="filter-row">
        <span class="lbl">間違えた回数</span>
        <select id="wrongOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="wrongVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="mini" style="margin-top:14px;">マーク回数で絞り込み（指定した条件をすべて満たす問題を出題）</div>
      <div class="filter-row">
        <span class="lbl"><span class="dot check"></span> チェック</span>
        <select id="checkOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="checkVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="filter-row">
        <span class="lbl"><span class="dot green"></span> 緑</span>
        <select id="greenOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="greenVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="filter-row">
        <span class="lbl"><span class="dot yellow"></span> 黄</span>
        <select id="yellowOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="yellowVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="filter-row">
        <span class="lbl"><span class="dot red"></span> 赤</span>
        <select id="redOp"><option value="off" selected>指定なし</option><option value="gte">以上</option><option value="lte">以下</option></select>
        <input type="number" id="redVal" min="0" value="1"><span class="mini">回</span>
      </div>
      <div class="mini" id="filterCount" style="margin-top:12px;"></div>
    </details>

    <details class="sec">
      <summary>これまでの成績</summary>
      <div id="statBody" class="mini"></div>
      <button class="btn-sm btn-danger" style="margin-top:12px;" onclick="resetStats()">⚠ 成績・履歴をリセット</button>
    </details>
  </div>

  <!-- ===== 出題画面 ===== -->
  <div id="quiz" class="hide">
    <div class="card">
      <div class="qmeta">
        <span id="qCounter"></span>
        <span class="tag" id="qTag"></span>
      </div>
      <div class="progress-bar"><div id="qBar" style="width:0%"></div></div>
      <div class="row spread" style="margin-bottom:10px;">
        <span class="mini" id="qAcc"></span>
        <button class="btn-sm btn-ghost" onclick="openHistory()">📋 解答履歴</button>
      </div>
      <div class="qtext" id="qText"></div>
      <div id="choices"></div>
      <div class="exp hide" id="expBox"></div>

      <div class="flag-bar" id="quizFlagBar">
        <span class="lbl">マーク:</span>
        <button class="flag-btn" data-flag="check" onclick="qAddFlag('check')"><span class="dot check"></span>チェック<span class="cnt" data-cnt="check">0</span></button>
        <button class="flag-btn" data-flag="green" onclick="qAddFlag('green')"><span class="dot green"></span>緑<span class="cnt" data-cnt="green">0</span></button>
        <button class="flag-btn" data-flag="yellow" onclick="qAddFlag('yellow')"><span class="dot yellow"></span>黄<span class="cnt" data-cnt="yellow">0</span></button>
        <button class="flag-btn" data-flag="red" onclick="qAddFlag('red')"><span class="dot red"></span>赤<span class="cnt" data-cnt="red">0</span></button>
        <button class="flag-undo" onclick="qUndoFlag()">↩ 取消</button>
      </div>
      <div class="flag-seq" id="quizFlagSeq"></div>

      <div class="quiz-footer">
        <button class="btn-ghost btn-sm" onclick="quitQuiz()">■ 中断してホームへ</button>
        <button id="nextBtn" class="btn-primary hide" onclick="nextQ()">次へ ▶</button>
      </div>
    </div>
  </div>

  <!-- ===== 問題一覧(ブラウズ) ===== -->
  <div id="browse" class="hide">
    <div class="card">
      <div class="row spread">
        <span class="label">問題一覧</span>
        <button class="btn-sm" onclick="closeBrowse()">■ ホームへ戻る</button>
      </div>
      <div class="filter-row" style="margin-top:14px;">
        <span class="lbl">分野で絞込</span>
        <select id="browseCat"></select>
      </div>
      <div class="filter-row">
        <span class="lbl">難易度で絞込</span>
        <select id="browseLevel"></select>
      </div>
      <div class="mini" id="browseCount" style="margin:10px 0;"></div>
      <div id="qlist"></div>
    </div>
  </div>

  <!-- ===== 問題詳細(ブラウズ) ===== -->
  <div id="browseDetail" class="hide">
    <div class="card">
      <button class="btn-sm" style="margin-bottom:14px;" onclick="backToList()">◀ 一覧へ戻る</button>
      <div class="qmeta"><span></span><span class="tag" id="bdTag"></span></div>
      <div class="qtext" id="bdText" style="margin-top:12px;"></div>
      <div id="bdChoices"></div>
      <div class="exp" id="bdExp"></div>

      <div class="flag-bar" id="bdFlagBar">
        <span class="lbl">マーク:</span>
        <button class="flag-btn" data-flag="check" onclick="bdAddFlag('check')"><span class="dot check"></span>チェック<span class="cnt" data-cnt="check">0</span></button>
        <button class="flag-btn" data-flag="green" onclick="bdAddFlag('green')"><span class="dot green"></span>緑<span class="cnt" data-cnt="green">0</span></button>
        <button class="flag-btn" data-flag="yellow" onclick="bdAddFlag('yellow')"><span class="dot yellow"></span>黄<span class="cnt" data-cnt="yellow">0</span></button>
        <button class="flag-btn" data-flag="red" onclick="bdAddFlag('red')"><span class="dot red"></span>赤<span class="cnt" data-cnt="red">0</span></button>
        <button class="flag-undo" onclick="bdUndoFlag()">↩ 取消</button>
      </div>
      <div class="flag-seq" id="bdFlagSeq"></div>
    </div>
  </div>

  <!-- ===== 結果 ===== -->
  <div id="result" class="hide">
    <div class="card score-wrap">
      <div class="mini">正答率</div>
      <div class="big" id="scorePct"></div>
      <div id="passFail" style="font-weight:600; margin:6px 0;"></div>
      <div class="mini" id="scoreDetail"></div>
    </div>
    <div class="card">
      <span class="label">分野別の正答率</span>
      <table id="catTable"></table>
    </div>
    <div class="row">
      <button class="btn-primary" onclick="location.reload()">ホームに戻る</button>
      <button onclick="retryWrong()">誤答した問題だけ復習</button>
    </div>
  </div>

  <!-- ===== 今回の解答履歴(ポップアップ) ===== -->
  <div id="historyModal" class="modal hide">
    <div class="modal-backdrop" onclick="closeHistory()"></div>
    <div class="modal-panel">
      <div class="row spread">
        <span class="label">今回の解答履歴</span>
        <button class="btn-sm btn-ghost" onclick="closeHistory()">✕ 閉じる</button>
      </div>
      <div id="historyListView" style="margin-top:10px;">
        <div id="historyList"></div>
      </div>
      <div id="historyDetailView" class="hide" style="margin-top:10px;">
        <button class="btn-sm" style="margin-bottom:10px;" onclick="backToHistoryList()">◀ 履歴一覧へ戻る</button>
        <div class="qmeta"><span></span><span class="tag" id="histTag"></span></div>
        <div class="qtext" id="histText" style="margin-top:8px;"></div>
        <div id="histChoices"></div>
        <div class="exp" id="histExp" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <!-- ===== 確認モーダル(共通) ===== -->
  <div id="confirmModal" class="modal hide">
    <div class="modal-backdrop" onclick="closeConfirm()"></div>
    <div class="modal-panel" style="max-width:420px;">
      <div class="label" id="confirmTitle"></div>
      <div class="mini" id="confirmMsg" style="margin-top:8px;"></div>
      <div class="row" style="margin-top:18px; justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeConfirm()">キャンセル</button>
        <button class="btn-primary" id="confirmOkBtn" onclick="confirmOk()">実行</button>
      </div>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script>
const LS_STATS = "da_exam_stats_v1";   // {qid: {seen, correct}}  (フォールバック用)
const LS_FLAGS = "da_exam_flags_v1";   // {qid: [...]}            (フォールバック用)
const API = "/api/progress";           // server.py 経由の保存先(progress.json)
let stats = {};
let flags = {};
let apiAvailable = false;   // server.py 経由(ブラウザ運用)で保存できるか
let desktopApi = false;     // pywebview(デスクトップアプリ)で保存できるか
let session = null;

// pywebview 環境なら window.pywebview.api が使えるようになるまで待つ。
// ブラウザでは window.pywebview が無いので即 false を返す(待たない)。
function pywebviewReady() {
  return new Promise(resolve => {
    if (!window.pywebview) return resolve(false);
    if (window.pywebview.api && window.pywebview.api.load) return resolve(true);
    window.addEventListener("pywebviewready", () => resolve(true), { once: true });
    setTimeout(() => resolve(!!(window.pywebview && window.pywebview.api && window.pywebview.api.load)), 1500);
  });
}

// 学習データを読み込む。デスクトップ(pywebview)→ server.py → localStorage の順。
async function loadData() {
  if (await pywebviewReady()) {
    try {
      const d = await window.pywebview.api.load();
      stats = d.stats || {};
      flags = d.flags || {};
      desktopApi = true;
      return;
    } catch (e) { /* 失敗時は下へフォールバック */ }
  }
  try {
    const r = await fetch(API, { cache: "no-store" });
    if (r.ok) {
      const d = await r.json();
      stats = d.stats || {};
      flags = d.flags || {};
      apiAvailable = true;
      return;
    }
  } catch (e) { /* サーバ未起動 → localStorage */ }
  stats = JSON.parse(localStorage.getItem(LS_STATS) || "{}");
  flags = JSON.parse(localStorage.getItem(LS_FLAGS) || "{}");
}

// 変更を保存(書き込みは短時間デバウンス)。
let _saveTimer = null;
function persist() {
  if (desktopApi) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
      try { window.pywebview.api.save({ stats, flags }); } catch (e) {}
    }, 250);
  } else if (apiAvailable) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stats, flags })
      }).catch(() => {});
    }, 250);
  } else {
    localStorage.setItem(LS_STATS, JSON.stringify(stats));
    localStorage.setItem(LS_FLAGS, JSON.stringify(flags));
  }
}

const FLAG_COLORS = ["check", "green", "yellow", "red"];
const FLAG_LABEL = { check: "チェック", green: "緑", yellow: "黄", red: "赤" };

function saveFlags() { persist(); }
function flagList(id) { return flags[id] || []; }
function flagCount(id, color) { return flagList(id).filter(f => f === color).length; }
function addFlagTo(id, color) { (flags[id] = flags[id] || []).push(color); saveFlags(); }
function undoFlagFrom(id) {
  if (flags[id] && flags[id].length) {
    flags[id].pop();
    if (flags[id].length === 0) delete flags[id];
    saveFlags();
  }
}

function flagSeqHtml(id) {
  const seq = flagList(id);
  if (seq.length === 0) return '<span>まだマークはありません</span>';
  return "<span>順番:</span>" + seq.map((f, i) =>
    `<span class="seq-dot"><span class="dot ${f}"></span><span class="num">${i + 1}</span></span>`
  ).join("");
}
function flagCountHtml(id) {
  return FLAG_COLORS.map(c => {
    const n = flagCount(id, c);
    return n ? `<span class="fc" title="${FLAG_LABEL[c]} ${n}回"><span class="dot ${c}"></span>×${n}</span>` : "";
  }).join("");
}
function updateFlagBar(barId, id) {
  const bar = document.getElementById(barId);
  bar.querySelectorAll(".flag-btn").forEach(b => {
    const c = b.dataset.flag;
    const n = flagCount(id, c);
    b.querySelector(".cnt").textContent = n;
    b.classList.toggle("active", n > 0);
  });
}

// ---- 絞り込み ----
function passesFilter(q) {
  const s = stats[q.id] || { seen: 0, correct: 0 };
  const seen = s.seen;
  const wrong = s.seen - s.correct;

  const seenOp = document.getElementById("seenOp").value;
  const seenVal = parseInt(document.getElementById("seenVal").value) || 0;
  if (seenOp === "gte" && !(seen >= seenVal)) return false;
  if (seenOp === "lte" && !(seen <= seenVal)) return false;

  const wrongOp = document.getElementById("wrongOp").value;
  const wrongVal = parseInt(document.getElementById("wrongVal").value) || 0;
  if (wrongOp === "gte" && !(wrong >= wrongVal)) return false;
  if (wrongOp === "lte" && !(wrong <= wrongVal)) return false;

  for (const c of FLAG_COLORS) {
    const op = document.getElementById(c + "Op").value;
    if (op === "off") continue;
    const val = parseInt(document.getElementById(c + "Val").value) || 0;
    const n = flagCount(q.id, c);
    if (op === "gte" && !(n >= val)) return false;
    if (op === "lte" && !(n <= val)) return false;
  }
  return true;
}

function updateFilterCount() {
  const cats = selectedCats();
  const levels = selectedLevels();
  const n = QUESTIONS.filter(q => cats.includes(q.cat) && levels.includes(q.level) && passesFilter(q)).length;
  document.getElementById("filterCount").textContent = `現在の条件に一致: ${n} 問`;
}

// ---- 分野チップ ----
function renderCats() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  for (const [key, name] of Object.entries(window.CATEGORIES)) {
    const n = QUESTIONS.filter(q => q.cat === key).length;
    grid.insertAdjacentHTML("beforeend",
      `<button type="button" class="chip on" data-cat="${key}" onclick="toggleCat(this)">${name}<span class="cnt">${n}</span></button>`);
  }
}
function toggleCat(el) { el.classList.toggle("on"); updateFilterCount(); }
function selectAll(v) {
  document.querySelectorAll("#catGrid .chip").forEach(c => c.classList.toggle("on", v));
  updateFilterCount();
}
function selectedCats() {
  return [...document.querySelectorAll("#catGrid .chip.on")].map(c => c.dataset.cat);
}

// ---- 難易度チップ ----
const LEVELS = ["A", "B", "C"];
const LEVEL_LABEL = { A: "A(基礎)", B: "B(応用)", C: "C(発展)" };
function renderLevels() {
  const grid = document.getElementById("levelGrid");
  grid.innerHTML = "";
  for (const lv of LEVELS) {
    const n = QUESTIONS.filter(q => q.level === lv).length;
    if (n === 0) continue;
    grid.insertAdjacentHTML("beforeend",
      `<button type="button" class="chip on" data-level="${lv}" onclick="toggleLevel(this)">${LEVEL_LABEL[lv]}<span class="cnt">${n}</span></button>`);
  }
}
function toggleLevel(el) { el.classList.toggle("on"); updateFilterCount(); }
function selectedLevels() {
  return [...document.querySelectorAll("#levelGrid .chip.on")].map(c => c.dataset.level);
}

// ---- 成績サマリ ----
function renderStats() {
  const ids = Object.keys(stats);
  let seen = 0, correct = 0;
  ids.forEach(id => { seen += stats[id].seen; correct += stats[id].correct; });
  const body = document.getElementById("statBody");
  if (seen === 0) { body.textContent = "まだ解答履歴がありません。"; return; }
  const pct = Math.round(correct / seen * 100);
  body.innerHTML =
    `延べ解答数: <b>${seen}</b>　累計正答率: <b>${pct}%</b>　`
    + `出題済み問題: <b>${ids.length} / ${QUESTIONS.length}</b>`;
}

function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---- クイズ ----
function startQuiz() {
  const cats = selectedCats();
  if (cats.length === 0) { alert("分野を1つ以上選択してください。"); return; }
  const levels = selectedLevels();
  if (levels.length === 0) { alert("難易度を1つ以上選択してください。"); return; }
  let pool = QUESTIONS.filter(q => cats.includes(q.cat) && levels.includes(q.level));

  if (document.getElementById("wrongOnly").checked) {
    pool = pool.filter(q => stats[q.id] && stats[q.id].seen > stats[q.id].correct);
    if (pool.length === 0) { alert("誤答した問題がありません。まずは通常出題で解いてみましょう。"); return; }
  }

  pool = pool.filter(passesFilter);
  if (pool.length === 0) { alert("絞り込み条件に一致する問題がありません。条件を変更してください。"); return; }

  if (document.getElementById("shuffle").checked) shuffleArr(pool);

  let num = parseInt(document.getElementById("numQ").value);
  if (num > 0 && pool.length > num) pool = pool.slice(0, num);

  session = { list: pool, idx: 0, correct: 0, answers: [] };
  document.getElementById("home").classList.add("hide");
  document.getElementById("result").classList.add("hide");
  document.getElementById("quiz").classList.remove("hide");
  showQ();
}

function showQ() {
  const q = session.list[session.idx];
  document.getElementById("qCounter").textContent =
    `第 ${session.idx + 1} 問 / 全 ${session.list.length} 問`;
  document.getElementById("qBar").style.width =
    (session.idx / session.list.length * 100) + "%";
  document.getElementById("qTag").textContent = window.CATEGORIES[q.cat];
  document.getElementById("qText").textContent = q.q;
  const box = document.getElementById("choices");
  box.innerHTML = "";
  q.choices.forEach((c, i) => {
    box.insertAdjacentHTML("beforeend",
      `<button class="choice" onclick="answer(${i})">${String.fromCharCode(65 + i)}. ${escapeHtml(c)}</button>`);
  });
  document.getElementById("expBox").classList.add("hide");
  document.getElementById("nextBtn").classList.add("hide");
  window.scrollTo(0, 0);
  renderFlagBar();
  updateQAccuracy();
}

function updateQAccuracy() {
  const el = document.getElementById("qAcc");
  if (!el) return;
  const answered = session.answers.length;
  if (answered === 0) { el.textContent = "正答率: -"; return; }
  const pct = Math.round(session.correct / answered * 100);
  el.textContent = `正答率: ${session.correct}/${answered} (${pct}%)`;
}

function renderFlagBar() {
  const q = session.list[session.idx];
  updateFlagBar("quizFlagBar", q.id);
  document.getElementById("quizFlagSeq").innerHTML = flagSeqHtml(q.id);
}
function qAddFlag(flag) { addFlagTo(session.list[session.idx].id, flag); renderFlagBar(); }
function qUndoFlag() { undoFlagFrom(session.list[session.idx].id); renderFlagBar(); }

function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

// 選択肢ごとの解説(折りたたみ)のHTMLを生成
function choiceExpDetails(q) {
  if (!q.choiceExp) return "";
  const items = q.choices.map((c, i) => {
    const ok = i === q.answer;
    return `<div class="choiceExp ${ok ? "ce-ok" : "ce-ng"}">`
      + `<b>${String.fromCharCode(65 + i)}</b> ${ok ? "◯" : "✕"} ${escapeHtml(q.choiceExp[i] || "")}</div>`;
  }).join("");
  return `<details class="ce-details"><summary>各選択肢の解説を見る</summary><div class="ce-list">${items}</div></details>`;
}

function answer(sel) {
  const q = session.list[session.idx];
  const correct = q.answer;
  document.querySelectorAll("#choices .choice").forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add("correct");
    else if (i === sel) b.classList.add("wrong");
    if (i === sel) {
      const mk = document.createElement("span");
      mk.className = "mk";
      mk.textContent = "あなたの解答";
      b.appendChild(mk);
    }
  });
  const isRight = sel === correct;
  if (isRight) session.correct++;
  session.answers.push({ id: q.id, cat: q.cat, right: isRight, sel });

  if (!stats[q.id]) stats[q.id] = { seen: 0, correct: 0 };
  stats[q.id].seen++;
  if (isRight) stats[q.id].correct++;
  persist();

  const exp = document.getElementById("expBox");
  exp.innerHTML =
    (isRight ? `<span class="verdict ok"><b>正解</b></span>` : `<span class="verdict ng"><b>不正解</b></span>`)
    + ` 正解は <b>${String.fromCharCode(65 + correct)}</b>。`
    + `<div class="exp-main">${escapeHtml(q.exp)}</div>`
    + choiceExpDetails(q);
  exp.classList.remove("hide");
  document.getElementById("nextBtn").classList.remove("hide");
  updateQAccuracy();
}

function nextQ() {
  session.idx++;
  if (session.idx >= session.list.length) showResult();
  else showQ();
}

function showResult() {
  document.getElementById("quiz").classList.add("hide");
  document.getElementById("result").classList.remove("hide");
  window.scrollTo(0, 0);
  const total = session.list.length;
  const pct = Math.round(session.correct / total * 100);
  document.getElementById("scorePct").textContent = pct + "%";
  const pass = pct >= 70;
  const pf = document.getElementById("passFail");
  pf.textContent = pass ? "✅ 合格ライン(70%)到達！" : "❌ 合格ライン(70%)まであと " + (70 - pct) + "%";
  pf.className = pass ? "ok-txt" : "ng-txt";
  document.getElementById("scoreDetail").textContent = `${total}問中 ${session.correct}問 正解`;

  const byCat = {};
  session.answers.forEach(a => {
    byCat[a.cat] = byCat[a.cat] || { n: 0, c: 0 };
    byCat[a.cat].n++; if (a.right) byCat[a.cat].c++;
  });
  let html = "<tr><th>分野</th><th>正答</th><th>正答率</th></tr>";
  for (const [cat, v] of Object.entries(byCat)) {
    const p = Math.round(v.c / v.n * 100);
    html += `<tr><td>${window.CATEGORIES[cat]}</td><td>${v.c}/${v.n}</td>`
          + `<td class="${p>=70?'ok-txt':'ng-txt'}">${p}%</td></tr>`;
  }
  document.getElementById("catTable").innerHTML = html;
}

function retryWrong() {
  const wrongIds = session.answers.filter(a => !a.right).map(a => a.id);
  if (wrongIds.length === 0) { alert("誤答はありませんでした！"); return; }
  let pool = QUESTIONS.filter(q => wrongIds.includes(q.id));
  shuffleArr(pool);
  session = { list: pool, idx: 0, correct: 0, answers: [] };
  document.getElementById("result").classList.add("hide");
  document.getElementById("quiz").classList.remove("hide");
  showQ();
}

// ---- 今回の解答履歴(ポップアップ) ----
function openHistory() {
  renderHistoryList();
  document.getElementById("historyDetailView").classList.add("hide");
  document.getElementById("historyListView").classList.remove("hide");
  document.getElementById("historyModal").classList.remove("hide");
}
function closeHistory() {
  document.getElementById("historyModal").classList.add("hide");
}
function renderHistoryList() {
  const box = document.getElementById("historyList");
  if (!session || session.answers.length === 0) {
    box.innerHTML = '<div class="mini">まだ解答した問題がありません。</div>';
    return;
  }
  box.innerHTML = "";
  session.answers.forEach((a, i) => {
    const q = QUESTIONS.find(x => x.id === a.id);
    const short = q ? q.q.split("\n")[0] : "";
    box.insertAdjacentHTML("beforeend",
      `<button class="qlist-item" onclick="reviewFromHistory(${i})">
         <span class="qnum">第${i + 1}問</span>
         <span class="qsummary">${escapeHtml(short)}</span>
         <span style="font-weight:600;" class="${a.right ? 'ok-txt' : 'ng-txt'}">${a.right ? "○" : "✕"}</span>
       </button>`);
  });
}
function reviewFromHistory(idx) {
  const rec = session.answers[idx];
  const q = QUESTIONS.find(x => x.id === rec.id);
  if (!q || !rec) return;
  document.getElementById("historyListView").classList.add("hide");
  document.getElementById("historyDetailView").classList.remove("hide");
  document.getElementById("histTag").textContent =
    window.CATEGORIES[q.cat] + (q.level ? " ／ 難易度" + q.level : "") + " ／ No." + q.id;
  document.getElementById("histText").textContent = q.q;

  const box = document.getElementById("histChoices");
  box.innerHTML = "";
  q.choices.forEach((c, i) => {
    const isCorrect = i === q.answer;
    const isSel = i === rec.sel;
    let cls = "choice";
    if (isCorrect) cls += " correct";
    else if (isSel) cls += " wrong";
    const mk = isSel ? '<span class="mk">あなたの解答</span>' : "";
    box.insertAdjacentHTML("beforeend",
      `<div class="${cls}">${String.fromCharCode(65 + i)}. ${escapeHtml(c)}${mk}</div>`);
  });
  document.getElementById("histExp").innerHTML =
    `正解は <b>${String.fromCharCode(65 + q.answer)}</b>。`
    + `<div class="exp-main">${escapeHtml(q.exp)}</div>`
    + choiceExpDetails(q);
}
function backToHistoryList() {
  document.getElementById("historyDetailView").classList.add("hide");
  document.getElementById("historyListView").classList.remove("hide");
}

function quitQuiz() {
  openConfirm(
    "中断してホームへ戻る",
    "現在の解答内容(このセッションの履歴)は保存されずに終了します。ホームに戻りますか？",
    () => location.reload(),
    "ホームに戻る",
    "btn-primary"
  );
}

// ---- 確認モーダル(共通) ----
let _confirmCallback = null;
function openConfirm(title, msg, onOk, okLabel, okClass) {
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmMsg").textContent = msg;
  const okBtn = document.getElementById("confirmOkBtn");
  okBtn.textContent = okLabel || "実行";
  okBtn.className = okClass || "btn-primary";
  _confirmCallback = onOk;
  document.getElementById("confirmModal").classList.remove("hide");
}
function closeConfirm() {
  document.getElementById("confirmModal").classList.add("hide");
  _confirmCallback = null;
}
function confirmOk() {
  const cb = _confirmCallback;
  closeConfirm();
  if (cb) cb();
}

// ---- 終了 ----
async function exitApp() {
  // デスクトップアプリ(pywebview): 保存してウィンドウを閉じるだけ
  if (desktopApi) {
    if (!confirm("アプリを閉じますか？（成績は自動保存されます）")) return;
    clearTimeout(_saveTimer);
    try { await window.pywebview.api.save({ stats, flags }); } catch (e) {}
    try { window.pywebview.api.close(); } catch (e) {}
    return;
  }
  if (!confirm("サーバを終了してアプリを閉じますか？\n(未保存の操作は保存されます)")) return;
  if (apiAvailable) {
    clearTimeout(_saveTimer);
    try {
      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stats, flags })
      });
      await fetch("/api/shutdown", { method: "POST" });
    } catch (e) { /* 既に停止済みの可能性 */ }
  }
  document.body.innerHTML =
    '<div class="wrap"><div class="card score-wrap">' +
    '<h1>👋 お疲れさまでした</h1>' +
    '<p>サーバを終了しました。学習データは progress.json に保存されています。</p>' +
    '<p class="mini">このタブは閉じて構いません。自動で閉じない場合は手動で閉じてください。</p>' +
    '<button class="btn-primary" onclick="window.close()">タブを閉じる</button>' +
    '</div></div>';
  window.close();
}

function resetStats() {
  openConfirm(
    "成績・履歴をリセット",
    "すべての成績・解答履歴を削除します(マークも削除されます)。この操作は取り消せません。よろしいですか？",
    () => {
      stats = {};
      flags = {};
      localStorage.removeItem(LS_STATS);
      localStorage.removeItem(LS_FLAGS);
      persist();
      renderStats();
      updateFilterCount();
    },
    "削除する",
    "btn-danger"
  );
}

// 初期化: データ読込 → 旧形式マークの移行 → 描画
(async function init() {
  await loadData();
  for (const k in flags) { if (typeof flags[k] === "string") flags[k] = [flags[k]]; }
  renderCats();
  renderLevels();
  renderStats();
  updateFilterCount();
  document.getElementById("home").addEventListener("change", updateFilterCount);
})();
